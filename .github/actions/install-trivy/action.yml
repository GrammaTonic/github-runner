name: 'Install Trivy'
description: 'Install a pinned version of Trivy via the official apt repository. Replaces the duplicated inline install block used across multiple workflows.'
author: 'GrammaTonic'

inputs:
  trivy-version:
    description: 'Trivy version to install (e.g. 0.62.1). Defaults to the pinned stable version.'
    required: false
    default: '0.62.1'

runs:
  using: 'composite'
  steps:
    - name: Install Trivy via apt
      shell: bash
      run: |
        TRIVY_VERSION="${{ inputs.trivy-version }}"
        echo "Installing Trivy v${TRIVY_VERSION}"
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
          | gpg --dearmor \
          | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
          | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update -qq
        sudo apt-get install -y "trivy=${TRIVY_VERSION}"
        trivy --version
