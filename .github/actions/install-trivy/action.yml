name: 'Install Trivy'
description: 'Install a pinned version of Trivy using the official install script. Replaces the duplicated inline install block used across multiple workflows.'
author: 'GrammaTonic'

inputs:
  trivy-version:
    description: 'Trivy version to install (e.g. v0.62.0). Defaults to latest.'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Install Trivy
      shell: bash
      run: |
        TRIVY_VERSION="${{ inputs.trivy-version }}"
        echo "Installing Trivy (${TRIVY_VERSION})"
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sudo sh -s -- -b /usr/local/bin "${TRIVY_VERSION}"
        trivy --version
