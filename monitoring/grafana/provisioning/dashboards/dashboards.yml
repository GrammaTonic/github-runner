# Grafana Dashboard Provisioning Configuration
# Auto-loads all dashboard JSON files when Grafana starts
#
# Usage: Mount this file to /etc/grafana/provisioning/dashboards/dashboards.yml
# and mount the dashboards directory to /var/lib/grafana/dashboards/

apiVersion: 1

providers:
  - name: 'GitHub Actions Runners'
    orgId: 1
    folder: 'GitHub Actions'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
